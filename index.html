<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World!</title>
    <script>
      // Apply the persisted theme (or system preference) before React mounts
      // to avoid a flash of the wrong color scheme. The storage key must stay
      // in sync with THEME_STORAGE_KEY in src/App.tsx.
      (function () {
        try {
          var stored = window.localStorage.getItem('hello-world-app:theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.setAttribute('data-theme', stored);
            return;
          }
          if (
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
          ) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {
          // Ignore — React will apply the theme on mount.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
